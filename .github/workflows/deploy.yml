name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build
        run: bun run build
        env:
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
          PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${{ secrets.PUBLIC_KEYSTATIC_GITHUB_APP_SLUG }}

      - name: Package
        run: |
          cp package.json dist/
          cd dist && zip -rq ../astro-dist.zip .

      - name: Deploy
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get install -y -qq sshpass
          sshpass -e scp -o StrictHostKeyChecking=accept-new astro-dist.zip root@${{ secrets.VPS_HOST }}:/tmp/astro-dist.zip
          sshpass -e ssh -o StrictHostKeyChecking=accept-new root@${{ secrets.VPS_HOST }} \
            "env REMOTE_DIR=/opt/internetaddicts ZIP_PATH=/tmp/astro-dist.zip bash -s" \
            < cloud/local/update-ui-from-zip.sh
