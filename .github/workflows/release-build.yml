# Сборка продакшен-билда при публикации GitHub Release.
# Артефакт `dist` можно скачать из вкладки Actions → нужный run → Artifacts.
name: Release build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # При необходимости задайте в Settings → Secrets and variables → Actions
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
          PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${{ secrets.PUBLIC_KEYSTATIC_GITHUB_APP_SLUG }}

      - name: Verify dist is non-empty
        run: |
          find dist -type f | wc -l
          du -sh dist
          test "$(find dist -type f | wc -l)" -gt 0

      - name: Zip dist (for Release assets)
        run: (cd dist && zip -r "../astro-dist-${{ github.event.release.tag_name }}.zip" .)

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: astro-dist-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error
