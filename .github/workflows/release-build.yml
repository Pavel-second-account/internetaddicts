# Сборка при публикации GitHub Release: dist → astro-dist-<tag>.zip + package.json (и lock при наличии)
# в те же Release assets. VPS качает манифесты с github.com/.../releases/download/<tag>/ — без raw.githubusercontent.com
# (с некоторых хостингов raw даёт 404). Скачать: Releases, либо Actions → Artifacts (только dist).
name: Release build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
          PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${{ secrets.PUBLIC_KEYSTATIC_GITHUB_APP_SLUG }}

      - name: Verify dist (Node standalone)
        run: |
          test -d dist
          test -f dist/server/entry.mjs
          n="$(find dist -type f | wc -l)"
          echo "files in dist: $n"
          test "$n" -gt 0

      - name: Zip dist only (Release asset)
        run: (cd dist && zip -r "../astro-dist-${{ github.event.release.tag_name }}.zip" .)

      - name: Stage npm manifests for Release assets
        run: |
          mkdir -p release-assets
          cp package.json release-assets/package.json
          if [ -f package-lock.json ]; then
            cp package-lock.json release-assets/package-lock.json
          fi

      - name: Attach zip and manifests to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            astro-dist-${{ github.event.release.tag_name }}.zip
            release-assets/package.json
            release-assets/package-lock.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error
